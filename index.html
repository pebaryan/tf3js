<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titanfall 3JS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
        font-family: 'Orbitron', sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
      #crosshair {
        --spread: 0px;
        position: fixed;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        pointer-events: none;
        z-index: 100;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #00ffcc;
      }
      #crosshair::before {
        /* top segment + bottom segment via box-shadow */
        width: 2px;
        height: 8px;
        left: -1px;
        top: calc(-11px - var(--spread));
        box-shadow: 0 calc(14px + var(--spread) * 2) 0 0 #00ffcc;
      }
      #crosshair::after {
        /* left segment + right segment via box-shadow */
        width: 8px;
        height: 2px;
        top: -1px;
        left: calc(-11px - var(--spread));
        box-shadow: calc(14px + var(--spread) * 2) 0 0 0 #00ffcc;
      }
      #hud {
        position: fixed;
        bottom: 20px;
        left: 20px;
        color: #00ffcc;
        font-size: 14px;
        z-index: 100;
        text-shadow: 0 0 10px #00ffcc;
      }
      #hud .bar {
        width: 200px;
        height: 8px;
        background: rgba(0, 255, 204, 0.2);
        margin-top: 5px;
        border: 1px solid #00ffcc;
      }
      #hud .bar-fill {
        height: 100%;
        background: #00ffcc;
        transition: width 0.1s;
      }
      .hidden {
        display: none !important;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<style>
  .menu-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 200;
    color: #00ffcc;
    overflow: hidden;
  }

  .menu-overlay::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 201;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
  }

  .menu-overlay::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(18, 16, 16, 0.1);
    opacity: 0;
    z-index: 202;
    pointer-events: none;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0% { opacity: 0.1; }
    100% { opacity: 0.2; }
  }

    height: 100px;
    z-index: 203;

    position: absolute;
    bottom: 100%;
    animation: scanline 10s linear infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0% { bottom: 100%; }
    100% { bottom: -100px; }
  }

</style>
