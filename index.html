<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titanfall 3JS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
        font-family: 'Orbitron', sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 100;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #00ffcc;
      }
      #crosshair::before {
        width: 2px;
        height: 16px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      #crosshair::after {
        width: 16px;
        height: 2px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      #hud {
        position: fixed;
        bottom: 20px;
        left: 20px;
        color: #00ffcc;
        font-size: 14px;
        z-index: 100;
        text-shadow: 0 0 10px #00ffcc;
      }
      #hud .bar {
        width: 200px;
        height: 8px;
        background: rgba(0, 255, 204, 0.2);
        margin-top: 5px;
        border: 1px solid #00ffcc;
      }
      #hud .bar-fill {
        height: 100%;
        background: #00ffcc;
        transition: width 0.1s;
      }
      #instructions {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.8);
        padding: 40px;
        border: 2px solid #00ffcc;
        color: #fff;
        text-align: center;
        z-index: 200;
        cursor: pointer;
      }
      #instructions h1 {
        font-size: 48px;
        margin-bottom: 20px;
        color: #00ffcc;
        text-shadow: 0 0 20px #00ffcc;
      }
      #instructions p {
        margin: 10px 0;
        font-size: 16px;
        opacity: 0.8;
      }
      #instructions .controls {
        margin-top: 30px;
        text-align: left;
        font-size: 14px;
      }
      #instructions .controls div {
        margin: 8px 0;
      }
      #instructions .key {
        display: inline-block;
        background: #00ffcc;
        color: #000;
        padding: 4px 10px;
        border-radius: 4px;
        font-weight: bold;
        margin-right: 10px;
      }
      .hidden {
        display: none !important;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<style>
  .menu-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 200;
    color: #00ffcc;
  }
  
  .menu-content {
    text-align: center;
    background: rgba(10, 10, 30, 0.8);
    padding: 50px;
    border: 2px solid #00ffcc;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
  }
  
  .menu-content h1 {
    font-size: 48px;
    margin-bottom: 20px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
  }
  
  .menu-button {
    display: block;
    width: 250px;
    padding: 12px;
    margin: 10px auto;
    font-size: 18px;
    background: #00ffcc;
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Orbitron', sans-serif;
    font-weight: bold;
  }
  
  .menu-button:hover {
    background: #00ccaa;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
  }
  
  .menu-button:active {
    transform: scale(0.98);
  }
  
  #level-list {
    margin: 20px 0;
    max-height: 300px;
    overflow-y: auto;
    text-align: left;
  }
  
  #level-list .menu-button {
    width: 100%;
    margin: 5px 0;
  }
  
  #level-list .menu-button:hover {
    background: #00ccaa;
  }
</style>
